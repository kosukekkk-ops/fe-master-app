# codemagic.yaml — Capacitor iOS アプリをクラウド(Mac不要)でビルドし、
# App Store Connect(TestFlight/審査提出)へアップロードする設定。
#
# 【あなたがCodemagic側で1回だけ行う準備 = 環境変数を3つ登録するだけ】
# アプリの Environment variables タブで、Group名 "appstore" を作り、以下の3つを追加する
# (いずれも Secure=ON で保存):
#   APP_STORE_CONNECT_ISSUER_ID       … Issuer ID
#   APP_STORE_CONNECT_KEY_IDENTIFIER  … Key ID
#   APP_STORE_CONNECT_PRIVATE_KEY     … ダウンロードした .p8 ファイルの中身
#   CERTIFICATE_PRIVATE_KEY           … 署名証明書用の固定RSA秘密鍵(PKCS#1)。
#                                        ローカルの C:\Users\kosuk\Documents\codemagic_cert_key.pem の中身。
#                                        毎ビルド生成にすると証明書が増殖しApple上限(2枚)で詰むため固定。
# これだけで、署名・ビルド・TestFlight配信まで自動で走る(Teams/Integrationsの設定は不要)。

workflows:
  ios-release:
    name: iOS Release (App Store)
    instance_type: mac_mini_m2       # クラウド上の実機Mac(無料枠 月500分)
    max_build_duration: 60
    environment:
      groups:
        - appstore                   # ↑で作る環境変数グループ
      vars:
        BUNDLE_ID: "io.github.kosukekkkops.femaster"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: 6790236851   # App Store Connect上のアプリの数値ID
      node: 22          # Capacitor CLIがNode >=22を要求するため
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Sync Capacitor iOS (docs/ → ネイティブへコピー)
        script: npx cap sync ios
      - name: Set up code signing (API keyで証明書・プロファイルを自動発行)
        script: |
          keychain initialize
          # 証明書用の秘密鍵は環境変数の固定鍵を使う。
          # ※ビルド内でその都度生成すると毎回別の証明書が必要になり、
          #   AppleのDistribution証明書上限(2枚)に達して3回目以降必ず失敗する。
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          # TestFlight上の最新ビルド番号+1を採番(重複アップロード防止)。
          # get-latest-app-store-build-number は「App Storeで公開済み」の番号しか見ないため、
          # 未公開のうちは常に0が返り毎回同じ番号になって重複エラー(409)を起こす。
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          LATEST=${LATEST:-0}
          cd ios/App
          agvtool new-version -all $(($LATEST + 1))
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true     # まずTestFlight(自分の端末で最終確認)へ
        beta_groups:                   # 承認後、外部グループへ自動配信
          - 公開テスター
        # submit_to_app_store: true    # 審査に出す準備ができたらこの行を有効化

  # ---- 1回だけ使うセットアップ: IAP商品(プレミアム¥720・非消耗型)の作成 ----
  # 有料App契約が有効になってから実行する。冪等(既存ならスキップ)。
  iap-setup:
    name: IAP product setup (premium)
    instance_type: mac_mini_m2
    max_build_duration: 15
    environment:
      groups:
        - appstore
      vars:
        APP_APPLE_ID: "6790236851"
        PRODUCT_ID: "io.github.kosukekkkops.femaster.premium"
        PRODUCT_NAME: "プレミアム(全機能解放)"
        PRODUCT_DESC: "全380語の単語帳・科目B演習・学習ログの詳細分析を永続解放します。"
        PRICE_JPY: "720"
    scripts:
      - name: Create non-consumable IAP with JPY base price
        script: |
          CLI=$(which app-store-connect)
          VENV_PY=$(sed -n '1s/^#!//p' "$CLI")
          export VENV_PY
          python3 <<'PY'
          import os, json, subprocess, urllib.request, urllib.error, urllib.parse

          APP = os.environ['APP_APPLE_ID'].strip()
          PID = os.environ['PRODUCT_ID']
          PNAME = os.environ['PRODUCT_NAME']
          PDESC = os.environ['PRODUCT_DESC']
          PRICE = os.environ['PRICE_JPY']
          VENV_PY = os.environ['VENV_PY']

          MINT = (
              "import os\n"
              "from codemagic.apple.app_store_connect import AppStoreConnectApiClient, IssuerId, KeyIdentifier\n"
              "c = AppStoreConnectApiClient(\n"
              "    KeyIdentifier(os.environ['APP_STORE_CONNECT_KEY_IDENTIFIER'].strip()),\n"
              "    IssuerId(os.environ['APP_STORE_CONNECT_ISSUER_ID'].strip()),\n"
              "    os.environ['APP_STORE_CONNECT_PRIVATE_KEY'].strip())\n"
              "print(c.jwt)\n"
          )
          def token():
              return subprocess.check_output([VENV_PY, '-c', MINT], text=True).strip()

          def api(method, path, body=None):
              req = urllib.request.Request(
                  'https://api.appstoreconnect.apple.com' + path, method=method,
                  data=json.dumps(body).encode() if body else None,
                  headers={'Authorization': 'Bearer ' + token(),
                           'Content-Type': 'application/json'})
              try:
                  with urllib.request.urlopen(req) as r:
                      d = r.read()
                      return r.status, json.loads(d) if d else {}
              except urllib.error.HTTPError as e:
                  return e.code, json.loads(e.read() or b'{}')

          # 1) 既存確認(冪等)
          s, d = api('GET', f'/v1/apps/{APP}/inAppPurchasesV2?filter[productId]={urllib.parse.quote(PID)}')
          assert s == 200, d
          if d['data']:
              iap = d['data'][0]
              print('IAP already exists:', iap['id'], iap['attributes'].get('state'), flush=True)
          else:
              s, d = api('POST', '/v2/inAppPurchases', {'data': {
                  'type': 'inAppPurchases',
                  'attributes': {'name': PNAME, 'productId': PID,
                                 'inAppPurchaseType': 'NON_CONSUMABLE'},
                  'relationships': {'app': {'data': {'type': 'apps', 'id': APP}}}}})
              assert s == 201, d
              iap = d['data']
              print('IAP created:', iap['id'], flush=True)
          iid = iap['id']

          # 2) 日本語ローカリゼーション(表示名・説明)
          s, d = api('GET', f'/v2/inAppPurchases/{iid}/inAppPurchaseLocalizations')
          have_ja = s == 200 and any(l['attributes'].get('locale') == 'ja' for l in d.get('data', []))
          if not have_ja:
              s, d = api('POST', '/v1/inAppPurchaseLocalizations', {'data': {
                  'type': 'inAppPurchaseLocalizations',
                  'attributes': {'locale': 'ja', 'name': PNAME, 'description': PDESC},
                  'relationships': {'inAppPurchaseV2': {'data': {'type': 'inAppPurchases', 'id': iid}}}}})
              print('ja localization:', s, json.dumps(d)[:200], flush=True)
          else:
              print('ja localization exists', flush=True)

          # 3) 価格: 日本の価格ポイントから¥720を探して基準価格に設定
          pts, cursor = [], f'/v2/inAppPurchases/{iid}/pricePoints?filter[territory]=JPN&limit=200'
          while cursor:
              s, d = api('GET', cursor)
              assert s == 200, d
              pts += d['data']
              nxt = (d.get('links') or {}).get('next')
              cursor = nxt.replace('https://api.appstoreconnect.apple.com', '') if nxt else None
          target = next((p for p in pts if p['attributes'].get('customerPrice') == PRICE), None)
          assert target, f'price point {PRICE} not found in {len(pts)} points'
          s, d = api('POST', '/v1/inAppPurchasePriceSchedules', {
              'data': {'type': 'inAppPurchasePriceSchedules',
                       'relationships': {
                           'inAppPurchase': {'data': {'type': 'inAppPurchases', 'id': iid}},
                           'baseTerritory': {'data': {'type': 'territories', 'id': 'JPN'}},
                           'manualPrices': {'data': [{'type': 'inAppPurchasePrices', 'id': '${price1}'}]}},
                       },
              'included': [{'type': 'inAppPurchasePrices', 'id': '${price1}',
                            'attributes': {'startDate': None},
                            'relationships': {
                                'inAppPurchasePricePoint': {'data': {'type': 'inAppPurchasePricePoints', 'id': target['id']}},
                                'inAppPurchaseV2': {'data': {'type': 'inAppPurchases', 'id': iid}}}}]})
          print('price schedule:', s, json.dumps(d)[:200], flush=True)

          # 4) 全地域で販売可能に
          s, d = api('GET', '/v1/territories?limit=200')
          assert s == 200, d
          terrs = [{'type': 'territories', 'id': t['id']} for t in d['data']]
          s, d = api('POST', '/v1/inAppPurchaseAvailabilities', {
              'data': {'type': 'inAppPurchaseAvailabilities',
                       'attributes': {'availableInNewTerritories': True},
                       'relationships': {
                           'inAppPurchase': {'data': {'type': 'inAppPurchases', 'id': iid}},
                           'availableTerritories': {'data': terrs}}}})
          print('availability:', s, json.dumps(d)[:200], flush=True)

          # 5) 最終状態
          s, d = api('GET', f'/v2/inAppPurchases/{iid}')
          print('=== IAP STATE ===')
          print(json.dumps(d.get('data', {}).get('attributes', {}), ensure_ascii=False))
          PY

  # ---- 本審査準備: ストア掲載情報・審査連絡先・IAPスクショをAPIで一括登録 ----
  release-prep:
    name: App Store release prep (metadata)
    instance_type: mac_mini_m2
    max_build_duration: 15
    environment:
      groups:
        - appstore
      vars:
        APP_APPLE_ID: "6790236851"
        IAP_ID: "6791354550"
    scripts:
      - name: Set store metadata + review details + IAP screenshot
        script: |
          CLI=$(which app-store-connect)
          VENV_PY=$(sed -n '1s/^#!//p' "$CLI")
          export VENV_PY
          python3 <<'PY'
          import os, json, hashlib, subprocess, urllib.request, urllib.error

          APP = os.environ['APP_APPLE_ID'].strip()
          IAP = os.environ['IAP_ID'].strip()
          VENV_PY = os.environ['VENV_PY']

          MINT = (
              "import os\n"
              "from codemagic.apple.app_store_connect import AppStoreConnectApiClient, IssuerId, KeyIdentifier\n"
              "c = AppStoreConnectApiClient(\n"
              "    KeyIdentifier(os.environ['APP_STORE_CONNECT_KEY_IDENTIFIER'].strip()),\n"
              "    IssuerId(os.environ['APP_STORE_CONNECT_ISSUER_ID'].strip()),\n"
              "    os.environ['APP_STORE_CONNECT_PRIVATE_KEY'].strip())\n"
              "print(c.jwt)\n"
          )
          def token():
              return subprocess.check_output([VENV_PY, '-c', MINT], text=True).strip()

          def api(method, path, body=None):
              req = urllib.request.Request(
                  'https://api.appstoreconnect.apple.com' + path, method=method,
                  data=json.dumps(body).encode() if body else None,
                  headers={'Authorization': 'Bearer ' + token(),
                           'Content-Type': 'application/json'})
              try:
                  with urllib.request.urlopen(req) as r:
                      d = r.read()
                      return r.status, json.loads(d) if d else {}
              except urllib.error.HTTPError as e:
                  return e.code, json.loads(e.read() or b'{}')

          NAME = "受かる基本情報 FE過去問＆単語帳"
          SUBTITLE = "間違えた問題が自分専用の単語帳に"
          PRIVACY_URL = "https://kosukekkk-ops.github.io/fe-master-app/privacy.html"
          SUPPORT_URL = "https://github.com/kosukekkk-ops/fe-master-app"
          MARKETING_URL = "https://kosukekkk-ops.github.io/fe-master-app/"
          PROMO = '間違えた問題が、そのまま"自分専用の単語帳"になる。科目A・科目B対応の3,173問×苦手の自動蓄積で、スキマ時間から最短ルートの合格対策を。完全オフライン・広告なし。'
          KEYWORDS = "基本情報,基本情報技術者,FE,過去問,単語帳,科目B,アルゴリズム,午前,IT,資格,情報処理,一問一答,暗記,IPA,勉強"
          DESC = """基本情報技術者試験(FE)の合格を目指す人のための、過去問演習×単語帳アプリです。

          「問題を解く → 間違えた問題の重要用語が自動で苦手単語帳にたまる → 単語帳で復習する」
          解けば解くほど、あなた専用の弱点対策ノートが育ちます。

          ■ こんな方におすすめ
          ・基本情報技術者試験(FE)の合格を目指している方
          ・通勤・通学のスキマ時間で効率よく勉強したい方
          ・暗記が苦手で、弱点の整理はアプリに任せたい方

          ■ 問題演習(科目A・科目B対応/3,173問収録)
          ・IPA公式公開問題+シラバス準拠のオリジナル問題
          ・全問に丁寧な解説付き。誤答の選択肢が「本当は何の用語か」まで解説
          ・計算問題(稼働率・基数変換・損益分岐点など)も豊富に収録
          ・科目Bは擬似言語のトレース問題やセキュリティ事例に対応
          ・「わからない」ボタンで解説だけ確認することもできます
          ・前の問題に戻る/途中中断にも対応

          ■ 苦手単語帳(このアプリの核)
          ・間違えた問題の重要用語が自動で登録されます
          ・間違えた回数順に並ぶので、弱いところから復習できる
          ・タップでめくるフラッシュカード。身近な例え話つきでスッと頭に入る
          ・「試験ではこう出る」の実戦メモつき
          ・覚えた単語は非表示にでき、シャッフル出題も可能

          ■ 学習ログ
          ・9分野のレーダーチャートで弱点分野がひと目でわかる
          ・日別の正答率推移、間違えた回数ランキング

          ■ 使いやすさ
          ・完全オフライン対応(機内モード・地下鉄でも学習OK)
          ・ライト/ダークテーマ切り替え
          ・ログイン不要・広告なし

          ■ 料金
          基本無料でお使いいただけます。
          プレミアム(買い切り・追加課金なし)で全機能を解放できます。
          ・無料: 科目Aの演習、苦手単語帳、全単語帳50語まで、基本統計
          ・プレミアム: 全380語の単語帳、科目B演習、学習ログの詳細分析

          ■ ご注意
          本アプリは個人開発の学習教材であり、試験実施団体(IPA)とは関係ありません。「基本情報技術者試験」はIPAの登録商標または名称です。"""
          REVIEW_NOTES = """ログイン不要で全機能をお試しいただけます。
          App内課金「プレミアム(全機能解放)」(非消耗型・¥720)は、演習開始画面の「科目B」タブ、または設定タブ内「プレミアム」からご確認いただけます。
          購入すると、単語帳の全380語・科目B演習・学習ログの詳細分析が解放されます。
          「購入を復元」は設定タブと購入画面の両方に設置しています。
          本アプリはユーザーデータを一切収集しません(学習履歴は端末内にのみ保存)。"""
          IAP_NOTE = "非消耗型(¥720)。演習開始画面の「科目B」または設定タブ「プレミアム」から購入画面を表示できます。購入で単語帳全380語・科目B演習・学習ログ詳細分析が解放されます。復元ボタンあり。"

          # 1) アプリ名・サブタイトル・プライバシーポリシーURL (appInfoLocalizations ja)
          s, d = api('GET', f'/v1/apps/{APP}/appInfos?include=appInfoLocalizations&limit=2')
          assert s == 200, d
          loc_id = None
          for inc in d.get('included', []):
              if inc['type'] == 'appInfoLocalizations' and inc['attributes'].get('locale') == 'ja':
                  loc_id = inc['id']
          assert loc_id, 'ja appInfoLocalization not found'
          s, d = api('PATCH', f'/v1/appInfoLocalizations/{loc_id}', {'data': {
              'type': 'appInfoLocalizations', 'id': loc_id,
              'attributes': {'name': NAME, 'subtitle': SUBTITLE, 'privacyPolicyUrl': PRIVACY_URL}}})
          print('app name/subtitle/privacyUrl:', s, json.dumps(d)[:200], flush=True)

          # 2) バージョン1.0のローカライズ(説明・キーワード等)
          s, d = api('GET', f'/v1/apps/{APP}/appStoreVersions?filter[platform]=IOS&limit=1')
          assert s == 200 and d['data'], d
          vid = d['data'][0]['id']
          print('version:', vid, d['data'][0]['attributes'].get('versionString'),
                d['data'][0]['attributes'].get('appStoreState'), flush=True)
          s, d = api('GET', f'/v1/appStoreVersions/{vid}/appStoreVersionLocalizations')
          assert s == 200, d
          vloc = next((l['id'] for l in d['data'] if l['attributes'].get('locale') == 'ja'), None)
          assert vloc, 'ja version localization not found'
          s, d = api('PATCH', f'/v1/appStoreVersionLocalizations/{vloc}', {'data': {
              'type': 'appStoreVersionLocalizations', 'id': vloc,
              'attributes': {'description': DESC, 'keywords': KEYWORDS, 'promotionalText': PROMO,
                             'supportUrl': SUPPORT_URL, 'marketingUrl': MARKETING_URL}}})
          print('version localization:', s, json.dumps(d)[:200], flush=True)

          # 3) 審査連絡先(App Review情報)
          s, d = api('GET', f'/v1/appStoreVersions/{vid}/appStoreReviewDetail')
          detail_id = d.get('data', {}).get('id') if s == 200 and d.get('data') else None
          attrs = {'contactFirstName': '康介', 'contactLastName': '菊池',
                   'contactPhone': '+818077174466', 'contactEmail': 'kosuke.kkk@icloud.com',
                   'demoAccountRequired': False, 'notes': REVIEW_NOTES}
          if detail_id:
              s, d = api('PATCH', f'/v1/appStoreReviewDetails/{detail_id}',
                         {'data': {'type': 'appStoreReviewDetails', 'id': detail_id, 'attributes': attrs}})
          else:
              s, d = api('POST', '/v1/appStoreReviewDetails',
                         {'data': {'type': 'appStoreReviewDetails', 'attributes': attrs,
                                   'relationships': {'appStoreVersion': {'data': {'type': 'appStoreVersions', 'id': vid}}}}})
          print('review details:', s, json.dumps(d)[:200], flush=True)

          # 4) IAP: 審査メモ + 審査用スクリーンショット
          s, d = api('PATCH', f'/v2/inAppPurchases/{IAP}', {'data': {
              'type': 'inAppPurchases', 'id': IAP, 'attributes': {'reviewNote': IAP_NOTE}}})
          print('iap review note:', s, flush=True)
          s, d = api('GET', f'/v2/inAppPurchases/{IAP}/appStoreReviewScreenshot')
          has_shot = s == 200 and d.get('data')
          if not has_shot:
              img = open('store/iap-review-screenshot.png', 'rb').read()
              md5 = hashlib.md5(img).hexdigest()
              s, d = api('POST', '/v1/inAppPurchaseAppStoreReviewScreenshots', {'data': {
                  'type': 'inAppPurchaseAppStoreReviewScreenshots',
                  'attributes': {'fileName': 'iap-review-screenshot.png', 'fileSize': len(img)},
                  'relationships': {'inAppPurchaseV2': {'data': {'type': 'inAppPurchases', 'id': IAP}}}}})
              assert s == 201, d
              shot = d['data']
              for op in shot['attributes']['uploadOperations']:
                  hdrs = {h['name']: h['value'] for h in op.get('requestHeaders', [])}
                  req = urllib.request.Request(op['url'], method=op['method'],
                                               data=img[op['offset']:op['offset']+op['length']], headers=hdrs)
                  with urllib.request.urlopen(req) as r:
                      print('upload chunk:', r.status, flush=True)
              s, d = api('PATCH', f"/v1/inAppPurchaseAppStoreReviewScreenshots/{shot['id']}",
                         {'data': {'type': 'inAppPurchaseAppStoreReviewScreenshots', 'id': shot['id'],
                                   'attributes': {'uploaded': True, 'sourceFileChecksum': md5}}})
              print('iap screenshot committed:', s, flush=True)
          else:
              print('iap screenshot already exists', flush=True)

          # 5) 年齢制限(全項目「なし」=4+)。API仕様変更で失敗しても続行(その場合はWebで2分)
          s, d = api('GET', f'/v1/apps/{APP}/appInfos?limit=2')
          info_id = d['data'][0]['id']
          s, d = api('GET', f'/v1/appInfos/{info_id}/ageRatingDeclaration')
          if s == 200 and d.get('data'):
              ar_id = d['data']['id']
              NONE_FIELDS = ['alcoholTobaccoOrDrugUseOrReferences', 'contests', 'gamblingSimulated',
                             'horrorOrFearThemes', 'matureOrSuggestiveThemes', 'medicalOrTreatmentInformation',
                             'profanityOrCrudeHumor', 'sexualContentGraphicAndNudity', 'sexualContentOrNudity',
                             'violenceCartoonOrFantasy', 'violenceRealistic',
                             'violenceRealisticProlongedGraphicOrSadistic']
              ar_attrs = {f: 'NONE' for f in NONE_FIELDS}
              ar_attrs.update({'gambling': False, 'unrestrictedWebAccess': False, 'lootBox': False})
              s, d = api('PATCH', f'/v1/ageRatingDeclarations/{ar_id}',
                         {'data': {'type': 'ageRatingDeclarations', 'id': ar_id, 'attributes': ar_attrs}})
              print('age rating:', s, json.dumps(d)[:300], flush=True)

          # 6) 最終状態の表示
          s, d = api('GET', f'/v2/inAppPurchases/{IAP}')
          print('IAP state:', d.get('data', {}).get('attributes', {}).get('state'), flush=True)
          print('=== DONE ===')
          PY

  # ---- 1回だけ使うセットアップ: 外部テスターグループ作成＋公開リンク＋ベータ審査提出 ----
  # (App Store Connect Webにログインせず、CIの正規API認証情報で実行するための小ワークフロー)
  testflight-setup:
    name: TestFlight external test setup
    instance_type: mac_mini_m2   # 無料プランで使えるのはmacのみ(linuxは不可)
    max_build_duration: 30
    environment:
      groups:
        - appstore
      vars:
        APP_APPLE_ID: "6790236851"
        GROUP_NAME: "公開テスター"
    scripts:
      - name: Create external group + public link + submit latest build for beta review
        script: |
          # 自作JWTはなぜか401になるため、公式CLIのPythonライブラリに
          # トークンを作らせる(CLI自身の認証は同環境で成功済み)。
          CLI=$(which app-store-connect)
          VENV_PY=$(sed -n '1s/^#!//p' "$CLI")
          echo "venv python: $VENV_PY"
          export VENV_PY
          python3 <<'PY'
          import os, json, time, subprocess, urllib.request, urllib.error, urllib.parse

          APP = os.environ['APP_APPLE_ID'].strip()
          GNAME = os.environ['GROUP_NAME']
          VENV_PY = os.environ['VENV_PY']

          MINT = (
              "import os\n"
              "from codemagic.apple.app_store_connect import AppStoreConnectApiClient, IssuerId, KeyIdentifier\n"
              "c = AppStoreConnectApiClient(\n"
              "    KeyIdentifier(os.environ['APP_STORE_CONNECT_KEY_IDENTIFIER'].strip()),\n"
              "    IssuerId(os.environ['APP_STORE_CONNECT_ISSUER_ID'].strip()),\n"
              "    os.environ['APP_STORE_CONNECT_PRIVATE_KEY'].strip())\n"
              "print(c.jwt)\n"
          )

          def token():
              return subprocess.check_output([VENV_PY, '-c', MINT], text=True).strip()

          t = token()
          print('official-client token length:', len(t), flush=True)

          def api(method, path, body=None):
              req = urllib.request.Request(
                  'https://api.appstoreconnect.apple.com' + path, method=method,
                  data=json.dumps(body).encode() if body else None,
                  headers={'Authorization': 'Bearer ' + token(),
                           'Content-Type': 'application/json'})
              try:
                  with urllib.request.urlopen(req) as r:
                      d = r.read()
                      return r.status, json.loads(d) if d else {}
              except urllib.error.HTTPError as e:
                  return e.code, json.loads(e.read() or b'{}')

          # 1) 最新ビルドのApple側処理(processingState=VALID)を待つ
          build = None
          for _ in range(50):
              s, d = api('GET', f'/v1/builds?filter[app]={APP}&sort=-uploadedDate&limit=1')
              assert s == 200, d
              if d['data']:
                  b = d['data'][0]
                  st = b['attributes']['processingState']
                  print('build', b['attributes']['version'], 'state:', st, flush=True)
                  if st == 'VALID':
                      build = b; break
                  if st in ('FAILED', 'INVALID'):
                      raise SystemExit('build processing ' + st)
              time.sleep(30)
          assert build, 'processed build not found'
          bid = build['id']

          # 2) 輸出コンプライアンス未申告なら「非該当の暗号なし」で申告
          if build['attributes'].get('usesNonExemptEncryption') is None:
              s, d = api('PATCH', f'/v1/builds/{bid}',
                         {'data': {'type': 'builds', 'id': bid,
                                   'attributes': {'usesNonExemptEncryption': False}}})
              print('export compliance set:', s, flush=True)
              assert s in (200, 204), d

          # 3) 外部グループを作成(既存なら再利用)し、公開リンクを有効化
          s, d = api('GET', f'/v1/betaGroups?filter[app]={APP}&filter[name]={urllib.parse.quote(GNAME)}')
          assert s == 200, d
          if d['data']:
              gid = d['data'][0]['id']
              print('group exists:', gid, flush=True)
              s, d = api('PATCH', f'/v1/betaGroups/{gid}',
                         {'data': {'type': 'betaGroups', 'id': gid,
                                   'attributes': {'publicLinkEnabled': True}}})
              assert s == 200, d
          else:
              s, d = api('POST', '/v1/betaGroups',
                         {'data': {'type': 'betaGroups',
                                   'attributes': {'name': GNAME, 'publicLinkEnabled': True},
                                   'relationships': {'app': {'data': {'type': 'apps', 'id': APP}}}}})
              assert s == 201, d
              gid = d['data']['id']
              print('group created:', gid, flush=True)

          # 4) ビルドをグループに追加(承認後に配信される)
          s, d = api('POST', f'/v1/betaGroups/{gid}/relationships/builds',
                     {'data': [{'type': 'builds', 'id': bid}]})
          print('build added to group:', s, flush=True)
          assert s in (200, 204), d

          # 5) ベータ審査へ提出(既に提出済みエラーは成功扱い)
          s, d = api('POST', '/v1/betaAppReviewSubmissions',
                     {'data': {'type': 'betaAppReviewSubmissions',
                               'relationships': {'build': {'data': {'type': 'builds', 'id': bid}}}}})
          print('beta review submission:', s, json.dumps(d)[:300], flush=True)

          # 6) 公開リンクを表示
          s, d = api('GET', f'/v1/betaGroups/{gid}')
          link = d['data']['attributes'].get('publicLink')
          print('=== PUBLIC LINK ===')
          print(link)
          print('===================')
          PY
